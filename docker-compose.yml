services:
  postgres:
    image: postgres:16-alpine
    container_name: lawmitran-postgres
    environment:
      POSTGRES_DB: lawmitran
      POSTGRES_USER: lawmitran
      POSTGRES_PASSWORD: lawmitran
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawmitran -d lawmitran"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: lawmitran-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: lawmitran-api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: lawmitran-web
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  postgres_data:
  minio_data:
